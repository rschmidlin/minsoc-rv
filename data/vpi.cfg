adapter driver jtag_vpi
transport select jtag

jtag_vpi_set_address 127.0.0.1
jtag_vpi_set_port 5555

adapter speed 1000

set _CHIPNAME riscv
jtag newtap $_CHIPNAME cpu -irlen 5

target create $_CHIPNAME.cpu riscv -chain-position $_CHIPNAME.cpu

riscv set_command_timeout_sec 60

init
sleep 1000
scan_chain
halt
